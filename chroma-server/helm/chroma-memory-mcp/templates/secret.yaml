apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chroma-memory-mcp.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chroma-memory-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | b64enc | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | b64enc | quote }}
