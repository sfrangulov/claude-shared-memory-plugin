services:
  chromadb:
    image: chromadb/chroma:1.5.2
    volumes:
      - chroma-data:/data

  mcp-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CHROMA_URL=http://chromadb:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MCP_PORT=3000
    depends_on:
      - chromadb
    restart: on-failure

volumes:
  chroma-data:
